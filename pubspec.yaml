name: shajarah
description: "شجرة - Visual Family Tree App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.9.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.3.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  cached_network_image: ^3.4.1
  pinput: ^3.0.1
  photo_view: ^0.15.0

  # Utils
  image_picker: ^1.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
